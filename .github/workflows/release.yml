name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Patch version in tauri.conf.json
        run: |
          jq '.version = "${{ steps.version.outputs.VERSION }}"' src-tauri/tauri.conf.json > tmp.json
          mv tmp.json src-tauri/tauri.conf.json

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_TEAM_ID || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "${{ github.ref_name }}"
          releaseBody: "See the assets to download and install this version."
          releaseDraft: false
          prerelease: false

      - name: Update Homebrew formula
        if: matrix.platform == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DMG_URL="https://github.com/mnapoli/PromptEdit/releases/download/v${VERSION}/PromptEdit_${VERSION}_aarch64.dmg"
          SHA256=$(shasum -a 256 src-tauri/target/release/bundle/dmg/PromptEdit_${VERSION}_aarch64.dmg | cut -d' ' -f1)

          git clone https://x-access-token:${GH_TOKEN}@github.com/mnapoli/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          cat > Formula/promptedit.rb << EOF
          class Promptedit < Formula
            desc "Lightweight prompt editor for Claude Code"
            homepage "https://github.com/mnapoli/PromptEdit"
            url "${DMG_URL}"
            sha256 "${SHA256}"
            version "${VERSION}"

            depends_on macos: :ventura

            def install
              app = "PromptEdit.app"
              prefix.install app
              (bin/"promptedit").write_exec_script "#{prefix}/#{app}/Contents/MacOS/PromptEdit"
            end
          end
          EOF

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Formula/promptedit.rb
          git commit -m "Update promptedit to v${VERSION}"
          git push
